<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Xenia V</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --white:  #ffffff;
      --ink:    #1a1a18;
      --purple: #e840b8;
      --soft:   #888884;
      --line:   #e4e4e0;
    }

    html {
      height: 100%;
    }

    body {
      min-height: 100dvh;
      min-height: 100svh;
      background: var(--white);
      color: var(--ink);
      font-family: \'Helvetica Neue\', Helvetica, Arial, sans-serif;
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding-top: max(3rem, env(safe-area-inset-top));
      padding-bottom: calc(60px + env(safe-area-inset-bottom));
      padding-left:  max(1.5rem, env(safe-area-inset-left));
      padding-right: max(1.5rem, env(safe-area-inset-right));
    }

    .container {
      width: 100%;
      max-width: 390px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Avatar ── */
    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: cover;
      object-position: center top;
      border: none;
      animation: fadeUp 0.8s 0.05s cubic-bezier(0.16,1,0.3,1) both;
    }

    /* ── Header ── */
    .name {
      margin-top: 1rem;
      font-family: \'Helvetica Neue\', Helvetica, Arial, sans-serif;
      font-weight: 300;
      font-size: 1.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      line-height: 1;
      text-align: center;
      color: var(--purple);
      animation: fadeUp 0.8s 0.15s cubic-bezier(0.16,1,0.3,1) both;
    }

    .tagline {
      margin-top: 0.7rem;
      font-family: \'Helvetica Neue\', Helvetica, Arial, sans-serif;
      font-weight: 400;
      font-size: 0.7rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--soft);
      text-align: center;
      animation: fadeUp 0.8s 0.22s cubic-bezier(0.16,1,0.3,1) both;
    }

    /* accent bar */
    .accent-bar {
      margin-top: 1.4rem;
      margin-bottom: 1.4rem;
      width: 24px;
      height: 2px;
      background: var(--purple);
      animation: expand 0.7s 0.3s cubic-bezier(0.16,1,0.3,1) both;
    }

    /* ── Links ── */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
    }

    .link-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 48px;
      padding: 0.85rem 1.5rem;
      text-decoration: none;
      color: var(--ink);
      border: 1px solid var(--line);
      font-family: \'Helvetica Neue\', Helvetica, Arial, sans-serif;
      font-size: 0.68rem;
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      background: var(--white);
      position: relative;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      transition: color 0.25s ease, border-color 0.25s ease;
    }

    .link-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--purple);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.28s cubic-bezier(0.16,1,0.3,1);
      z-index: 0;
    }

    .link-btn span { position: relative; z-index: 1; }

    .link-btn:hover,
    .link-btn:active  { color: var(--white); border-color: var(--purple); }
    .link-btn:hover::after,
    .link-btn:active::after { transform: scaleX(1); }

    .link-btn:nth-child(1) { animation: fadeUp 0.6s 0.45s both; }
    .link-btn:nth-child(2) { animation: fadeUp 0.6s 0.55s both; }

    /* ── Social icons ── */
    .socials {
      display: flex;
      gap: 2rem;
      margin-top: 2rem;
      animation: fadeUp 0.6s 0.65s both;
    }

    .social-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      color: var(--soft);
      -webkit-tap-highlight-color: transparent;
      transition: color 0.2s ease;
    }

    .social-icon svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    .social-icon:hover,
    .social-icon:active { color: var(--purple); }

    /* ── Bottom banner ── */
    .banner {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100vw;
      height: calc(44px + env(safe-area-inset-bottom));
      padding-bottom: env(safe-area-inset-bottom);
      background: var(--purple);
    }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes expand {
      from { width: 0; opacity: 0; }
      to   { width: 24px; opacity: 1; }
    }
  </style>
</head>
